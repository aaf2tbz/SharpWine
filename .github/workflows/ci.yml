name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python3 tools/ci/check-repository.py
      - run: python3 -m py_compile tools/ci/check-repository.py

  formatting:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends clang-format-18
      - run: sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
      - run: tools/ci/check-format.sh

  build-test:
    name: Build and test (${{ matrix.os }}, ${{ matrix.compiler }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: clang
            cc: clang
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc
          - os: macos-15
            compiler: apple-clang
            cc: clang
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DMSWR_WARNINGS_AS_ERRORS=ON
      - run: cmake --build build --parallel
      - run: ctest --test-dir build --output-on-failure
