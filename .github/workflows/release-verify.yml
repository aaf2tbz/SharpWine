name: Verify published SharpWine release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Published release tag to verify
        required: true
        default: v0.1.2

permissions:
  contents: read

jobs:
  verify-published-release:
    name: Download and smoke-test published SharpWine runtime
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: macos-15
    timeout-minutes: 30
    env:
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}
          persist-credentials: false
      - name: Download and validate the published release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets="${RUNNER_TEMP}/sharpwine-assets"
          mkdir -p "$assets"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir "$assets"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body \
            > "$assets/RELEASE-NOTES.md"
          commit="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json targetCommitish --jq .targetCommitish)"
          version="${TAG#v}"
          archive="sharpwine-v${version}-macos-arm64.tar.zst"
          (
            cd "$assets"
            shasum -a 256 -c "$archive.sha256"
          )
          python3 tools/release/validate-release-assets.py --directory "$assets" \
            --repository "$GITHUB_REPOSITORY" --commit "$commit" --version "$version"
          python3 tools/release/verify-published-release.py --directory "$assets" \
            --repository "$GITHUB_REPOSITORY" --tag "$TAG" --commit "$commit" \
            --no-expect-draft
      - name: Reconstruct the exact hash-bound x86_64 exception fixture
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          test "$(sysctl -in sysctl.proc_translated 2>/dev/null || echo 0)" = 0
          fixture="${RUNNER_TEMP}/x86_64_exit.exe"
          patch_set=$(python3 -c \
            'import json; print(json.load(open("release/current.json"))["runtimePatchSet"])')
          python3 tools/release/reconstruct-x86-64-fixture.py \
            --patch-set "$patch_set" --output "$fixture"
          printf 'X86_64_FIXTURE=%s\n' "$fixture" >> "$GITHUB_ENV"
      - name: Unpack and run bounded fresh-prefix smoke tests
        shell: bash
        run: |
          set -euo pipefail
          brew install zstd
          assets="${RUNNER_TEMP}/sharpwine-assets"
          root="${RUNNER_TEMP}/sharpwine-runtime"
          version="${TAG#v}"
          archive="sharpwine-v${version}-macos-arm64.tar.zst"
          mkdir -p "$root"
          "$(brew --prefix zstd)/bin/zstd" -d --stdout \
            "$assets/$archive" | tar -xf - -C "$root"
          runtime="$root/sharpwine-v${version}-macos-arm64"
          python3 tools/release/audit-runtime.py --root "$runtime"
          python3 tools/release/test-packaged-runtime.py --runtime "$runtime" \
            --x86-64-fixture "$X86_64_FIXTURE" \
            --skip-retained-x86-64 \
            --evidence "${RUNNER_TEMP}/published-release-evidence" \
            --stress-iterations 1 --timeout 300
