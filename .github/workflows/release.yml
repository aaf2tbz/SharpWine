name: Verify uploaded Wine release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integrated-wine-v0.1.0
  cancel-in-progress: false

jobs:
  verify-and-publish:
    name: Download, unpack, test, and publish v0.1.0
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Bind the draft to reviewed protected main
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = refs/heads/main
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)" = "$GITHUB_SHA"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v0.1.0" --jq .object.sha)" = "$GITHUB_SHA"
          gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft | grep -Fx true
          python3 tools/release/validate-readiness.py \
            --root "$GITHUB_WORKSPACE" \
            --protected-main-parent "$(git rev-parse "$GITHUB_SHA^")"
      - name: Download and verify the uploaded archive
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets="${RUNNER_TEMP}/metalsharp-wine-v0.1.0-assets"
          mkdir -p "$assets"
          gh release download v0.1.0 --repo "$GITHUB_REPOSITORY" --dir "$assets"
          test "$(find "$assets" -type f | wc -l | tr -d ' ')" = 2
          cd "$assets"
          shasum -a 256 -c metalsharp-wine-v0.1.0-macos-arm64.tar.zst.sha256
      - name: Unpack at the accepted Wine build path and run checks
        shell: bash
        run: |
          set -euo pipefail
          brew install zstd
          assets="${RUNNER_TEMP}/metalsharp-wine-v0.1.0-assets"
          release_user=averyfelts
          parent="/Users/${release_user}/Arm64WINE/.issue23"
          runtime="$parent/stage"
          sudo mkdir -p "$parent"
          sudo chown -R "$(id -u):$(id -g)" "/Users/${release_user}"
          "$(brew --prefix zstd)/bin/zstd" -d --stdout \
            "$assets/metalsharp-wine-v0.1.0-macos-arm64.tar.zst" | tar -xf - -C "$parent"
          mv "$parent/metalsharp-wine-v0.1.0-macos-arm64" "$runtime"
          python3 tools/release/test-packaged-runtime.py \
            --runtime "$runtime" \
            --evidence "${RUNNER_TEMP}/published-smoke-evidence" \
            --stress-iterations 1 \
            --timeout 300
      - name: Publish the verified unchanged draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)" = "$GITHUB_SHA"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v0.1.0" --jq .object.sha)" = "$GITHUB_SHA"
          gh release edit v0.1.0 --repo "$GITHUB_REPOSITORY" --draft=false --latest
