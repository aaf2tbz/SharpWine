name: Publish uploaded Wine release

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: integrated-wine-v0.1.0
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish uploaded v0.1.0 assets
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false
      - name: Bind publication to reviewed protected main and its draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = refs/heads/main
          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)"
          test "$main_sha" = "$GITHUB_SHA"
          python3 tools/release/validate-readiness.py \
            --root "$GITHUB_WORKSPACE" \
            --protected-main-parent "$(git rev-parse "$GITHUB_SHA^")"
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v0.1.0")"
          jq -e '.draft == true and .prerelease == false' <<<"$release" >/dev/null
          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v0.1.0" --jq .object.sha)"
          test "$tag_sha" = "$GITHUB_SHA"
      - name: Redownload and validate every manually uploaded asset
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_DIR: ${{ runner.temp }}/metalsharp-wine-v0.1.0-redownload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ASSET_DIR"
          gh release download v0.1.0 --repo "$GITHUB_REPOSITORY" --dir "$ASSET_DIR"
          gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" \
            --json body --jq .body > "$ASSET_DIR/RELEASE-NOTES.md"
          python3 tools/release/validate-release-assets.py \
            --directory "$ASSET_DIR" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --version 0.1.0
          python3 tools/release/verify-published-release.py \
            --directory "$ASSET_DIR" \
            --repository "$GITHUB_REPOSITORY" \
            --tag v0.1.0 \
            --commit "$GITHUB_SHA"
      - name: Run the downloaded native and hybrid package smoke
        env:
          ASSET_DIR: ${{ runner.temp }}/metalsharp-wine-v0.1.0-redownload
        shell: bash
        run: |
          set -euo pipefail
          brew install zstd
          unpacked="${RUNNER_TEMP}/metalsharp-wine-v0.1.0-published-smoke"
          evidence="${RUNNER_TEMP}/published-smoke-evidence"
          mkdir -p "$unpacked"
          "$(brew --prefix zstd)/bin/zstd" -d --stdout \
            "$ASSET_DIR/metalsharp-wine-v0.1.0-macos-arm64.tar.zst" | tar -xf - -C "$unpacked"
          python3 tools/release/test-packaged-runtime.py \
            --runtime "$unpacked/metalsharp-wine-v0.1.0-macos-arm64" \
            --evidence "$evidence" \
            --stress-iterations 1 \
            --timeout 300
      - name: Publish the unchanged verified draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)"
          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v0.1.0" --jq .object.sha)"
          test "$main_sha" = "$GITHUB_SHA"
          test "$tag_sha" = "$GITHUB_SHA"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v0.1.0" --jq .draft | grep -Fx true
          gh release edit v0.1.0 --repo "$GITHUB_REPOSITORY" --draft=false --latest
